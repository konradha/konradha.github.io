baseURL = 'https://konradha.com/'
languageCode = "en"
DefaultContentLanguage = "en"
ignoreErrors = ["error-remote-getjson"]

title = 'א'
theme = "hugo-paper"

[params]
  color = 'wheat'
  math = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$']]
        inline = [['$', '$']]

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 9



